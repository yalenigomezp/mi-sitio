<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="EstiloContact.css">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header>
        <h1 class="display-4 fw-bold">Contacto</h1>
        <p class="text-muted">¿Tienes alguna duda sobre diseño con IA? Escríbenos.</p>
    </header>
    <main class="container">
      <div class="row justify-content-center">
       <div class="col-md-8 col-lg-6">
        <form>
          <div class="mb-3">
            <label for="Nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="exampleFormControlInput1" placeholder="Nombre">
          </div>
          <div class="mb-3">
            <label for="Email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@gmail.com">
           </div>
           <div class="mb-3">
            <label for="Mensaje" class="form-label">Observaciones</label>
            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
           </div>
           <!-- Botón de envío (Agregado para completar la funcionalidad) -->
           <button type="submit" class="btn btn-primary">Enviar</button>
       
        </form>
       </div>
      </div>
      <br>
    </main>
    <br><br>
    <footer>
        
            <p>Esto es una pagina de Contacto</p>
        
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <a href="Index.html">Volver a Inicio</a>

    <div class="text-center">
      <a href="Index.html" class="btn btn-outline-primary btn-lg px-4">Volver a Principal</a>
   </div>
   
</body>
</html>
